    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: calc(100%-1rem);
            height: calc(100%-1rem);
            background-color: black;
            color: white;

        }

        body {
            padding: 1rem;
            margin: 1rem;
            color: white;
            font-size: small;
            height: 100%;
        }

        .media-flex {
            display: flexbox;
            width: 65%;
            padding: 0.3rem;
        }

        .media {
            width: 25px;
            display: inline-block;
            border: 1px solid chartreuse;
            color: white;
            text-align: center;
        }

        .t {
            width: 12.5px;
            display: inline-block;
        }

        .u {

            border: 1px solid gray;
        }

        .shift {
            display: inline-block;
            width: 12.5px;
            border: 1px solid cyan;
        }

        @keyframes blink {
            0% {
                filter: invert(0);
            }

            50% {
                filter: invert(1);
            }

            100% {
                filter: invert(0);
            }
        }

        .blink-animation {
            animation: blink 10ms infinite;
        }
    </style>

</head>

    <script>
        document.body.addEventListener('keypress', function (e) {
            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.toggle('blink-animation')
            } catch (e) {
                console.log(e);
            }

        });
        document.body.addEventListener('keyup', function (e) {
            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.remove('blink-animation');
            } catch (e) {
                console.log(e);
            }
        })
    </script>

    <script>
        var sequence = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', 'q', 'w', 'e', 'r', 't', 'y', 'u',
            'i', 'o', 'p', 'a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l', 'z', 'x', 'c', 'v', 'b', 'n',
            'm',
        ];
        var code = ['c', 'd', 'e', 'f', 'g', 'a', 'b'];

        var mapper = new Map();
        var idx = 0;
        var o = 1;

        for (var i = 0; i < sequence.length; i++) {
            j = i % 7;
            if (j == 0) {
                o++;
            }
            mapper.set(sequence[i], code[j] + o);
        }

        const synth = new Tone.Synth().toDestination();
        document.body.addEventListener('keydown', function (e) {
            document.getElementById('sheet').innerHTML += (mapper.get(e.key) != undefined ? e.key : "") + " | "
            synth.triggerAttackRelease(mapper.get(e.key), "8n");
        })
    </script>
