<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Piano</title>
    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js">
    </script>
    <script src="sequence.js">
    </script>
    <script src="keyMap.js">
    </script>
    <script src="keyList.js">
    </script>
    <script src="hzMap.js"></script>
    <script src="hzMapU3.js"></script>
    <script src="hzMapD5.js"></script>
    <script src="rythm.js"></script>
    <script src="stringSheet.js"></script>
    <link rel='stylesheet' href='main.css' />
</head>

<body>
    <div class='media-flex'>
        <div id='key-1' class="media">1</div>
        <div id='key-2' class="media">2</div>
        <div id='key-3' class="media">3</div>
        <div id='key-4' class="media">4</div>
        <div id='key-5' class="media">5</div>
        <div id='key-6' class="media">6</div>
        <div id='key-7' class="media">7</div>
        <div id='key-8' class="media">8</div>
        <div id='key-9' class="media">9</div>
        <div id='key-0' class="media">0</div>
        <div class="media u">-</div>
        <div class="media u">+</div>
    </div>
    <div class='media-flex'>
        <div class="t"></div>
        <div id='key-q' class="media">q</div>
        <div id='key-w' class="media">w</div>
        <div id='key-e' class="media">e</div>
        <div id='key-r' class="media">r</div>
        <div id='key-t' class="media">t</div>
        <div id='key-y' class="media">y</div>
        <div id='key-u' class="media">u</div>
        <div id='key-i' class="media">i</div>
        <div id='key-o' class="media">o</div>
        <div id='key-p' class="media">p</div>
        <div class="media u">{</div>
        <div class="media u">}</div>
    </div>

    <div class='media-flex'>
        <div class="t"></div>
        <div class="t"></div>
        <div id='key-a' class="media">a</div>
        <div id='key-s' class="media">s</div>
        <div id='key-d' class="media">d</div>
        <div id='key-f' class="media">f</div>
        <div id='key-g' class="media">g</div>
        <div id='key-h' class="media">h</div>
        <div id='key-j' class="media">j</div>
        <div id='key-k' class="media">k</div>
        <div id='key-l' class="media">l</div>
        <div class="media u">;</div>
        <div class="media u">'</div>
    </div>

    <div class='media-flex'>
        <div id='key-shift-l' class="shift">△</div>
        <div id='key-z' class="media">z</div>
        <div id='key-x' class="media">x</div>
        <div id='key-c' class="media">c</div>
        <div id='key-v' class="media">v</div>
        <div id='key-b' class="media">b</div>
        <div id='key-n' class="media">n</div>
        <div id='key-m' class="media">m</div>
        <div class="media u">,</div>
        <div class="media u">.</div>
        <div class="media u">/</div>
        <div id='key-shift-r' class="shift">△</div>
    </div>
    <script>
        var ri = 0;
        var ci = -1;
        var ai = 0;
        const s = new Tone.FMSynth().toDestination();
        const ss = new Tone.AMSynth().toDestination();
        var arraySheet = stringSheet.split(' ');
        var ai2 = 0;
        document.body.addEventListener('keydown', function (e) {

        });
        document.body.addEventListener('keypress', function (e) {

            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.toggle('blink-animation')

                const now = Tone.now();
                ss.triggerAttackRelease(hzMap[sequence.charAt(ci++)], "8n", now + 0.5);
            } catch (e) {
                // console.log(e);
            }

        });




        document.body.addEventListener('keyup', function (e) {

            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.remove('blink-animation');

                const now = Tone.now();
                ss.triggerAttackRelease(hzMapU5[sequence.charAt(ci++)], "8n", );
            } catch (e) {
                //console.log(e);
            }
        })
        document.body.addEventListener('keypress', function (e) {
            ai++;
            var temp = ai % ri;

            if (ai == rythm[ri] || rythm[ri] == 0) {
                ri++;
                ai = 0;
            }
            console.log(rythm[ri]);
            try {

                const now = Tone.now();
                s.triggerAttackRelease(hzMapU3[sequence.charAt(ci++)], "8n", now);
            } catch (e) {

                //console.log(e);
            }

        });
    </script>
</body>

</html>
