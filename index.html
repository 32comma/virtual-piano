    <style>
        * {

        html,
        body {
            width: calc(100%-1rem);

            color: white;

        }

        body {
            padding: 1rem;
            margin: 1rem;
            color: white;
            font-size: small;
            height: 100%;
        }

        .media-flex {
            display: flexbox;
            width: 100%;
            padding: 0.3rem;
        }

        .media {
            width: 50px;
            display: inline-block;
            border: 1px solid chartreuse;

        }

        .t {

        }

        .u {

        }

        .shift {
            display: inline-block;
            width: 50px;
            border: 1px solid cyan;
        }
