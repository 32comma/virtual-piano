    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: calc(100%-1rem);
            height: calc(100%-1rem);
            background-color: black;
            color: white;

        }

        body {
            padding: 1rem;
            margin: 1rem;
            color: white;
            font-size: small;
            height: 100%;
        }

        .media-flex {
            display: flexbox;
            width: 65%;
            padding: 0.3rem;
        }

        .media {
            width: 25px;
            display: inline-block;
            border: 1px solid chartreuse;
            color: white;
            text-align: center;
        }

        .t {
            width: 12.5px;
            display: inline-block;
        }

        .u {

            border: 1px solid gray;
        }

        .shift {
            display: inline-block;
            width: 12.5px;
            border: 1px solid cyan;
        }

        @keyframes blink {
            0% {
                filter: invert(0);
            }

            50% {
                filter: invert(1);
            }

            100% {
                filter: invert(0);
            }
        }

        .blink-animation {
            animation: blink 10ms infinite;
        }
    </style>

</head>

    <script>
        document.body.addEventListener('keypress', function (e) {
            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.toggle('blink-animation')
            } catch (e) {
                // console.log(e);
            }

        });
        document.body.addEventListener('keyup', function (e) {
            try {
                var keyElement = document.getElementById('key-' + e.key);
                keyElement.classList.remove('blink-animation');
            } catch (e) {
                //console.log(e);
            }
        })


        //const synth = new Tone.Synth().toDestination();
        //const synth = new Tone.AMSynth().toDestination();
        //const pluck = new Tone.PluckSynth().toDestination();
        //const synth = new Tone.MonoSynth().toDestination();

        document.body.addEventListener('keypress', function (e) {
            document.getElementById('sheet').innerHTML += (hzMap[e.key] != undefined ? e.key : "") + " | "
            const now = Tone.now();
            const f = new Tone.FMSynth().toDestination();
            const a = new Tone.FMSynth().toDestination();
            var l1 = ['1', '2', '3', '4', '5'];
            var l2 = ['6', '7', '8', '9', '0'];
            var l3 = ['q', 'w', 'e', 'r', 't'];
            var l4 = ['y', 'u', 'i', 'o', 'p'];
            var l5 = ['a', 's', 'd', 'f', 'g'];
            var l6 = ['h', 'j', 'k', 'l'];
            var l7 = ['z', 'x', 'c', 'v'];
            var l8 = ['b', 'n', 'm'];
            // const p = new Tone.PolySynth().toDestination();
            if (l1.includes(e.key)) {
                f.triggerAttackRelease(hzMap[e.key], "4n");
            }
            if (l2.includes(e.key)) {
                f.triggerAttackRelease(hzMap[e.key], "4n");
            }
            if (l3.includes(e.key)) {
                a.triggerAttackRelease(hzMap[e.key], "8n");
            }
            if (l4.includes(e.key)) {
                a.triggerAttackRelease(hzMap[e.key], "8n");
            }
            if (l5.includes(e.key)) {
                f.triggerAttackRelease(hzMap[e.key], "16n");
            }
            if (l6.includes(e.key)) {
                f.triggerAttackRelease(hzMap[e.key], "16n");
            }
            if (l7.includes(e.key)) {
                a.triggerAttackRelease(hzMap[e.key], "32n");
            }
            if (l8.includes(e.key)) {
                a.triggerAttackRelease(hzMap[e.key], "32n");
            }

        })
